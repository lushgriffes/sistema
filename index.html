function salvarTaxas(){
  const selic=+document.getElementById('cfgSelic').value;
  const spread=+document.getElementById('cfgSpread').value;
  if(isNaN(selic)||selic<0){toast('Taxa Selic inválida',true);return}
  if(isNaN(spread)||spread<0){toast('Spread inválido',true);return}
  D.taxaSelic=selic;D.spreadAportes=spread;
  saveData();toast(`Taxas atualizadas: Selic ${selic}% + Spread ${spread}% = ${(selic+spread).toFixed(2)}% a.a.`);renderPage();
}

async function buscarSelicBCB(){
  const btn=document.getElementById('btnBuscaSelic');
  if(btn){btn.textContent='⏳ Buscando...';btn.disabled=true}
  try{
    const resp=await fetch('https://api.bcb.gov.br/dados/serie/bcdata.sgs.432/dados?formato=json&dataInicial=01/01/2024&dataFinal=31/12/2026');
    if(!resp.ok)throw new Error('Erro HTTP '+resp.status);
    const dados=await resp.json();
    if(!Array.isArray(dados)||dados.length===0)throw new Error('Dados vazios');
    // Converter formato BCB (data DD/MM/AAAA, valor string) para nosso formato
    const novoHist=dados.map(d=>{
      const p=d.data.split('/');
      return{data:`${p[2]}-${p[1]}-${p[0]}`,taxa:parseFloat(d.valor)};
    }).filter(h=>!isNaN(h.taxa));
    // Atualizar histórico
    D.historicoSelic=novoHist;
    // Atualizar taxa atual com a mais recente
    if(novoHist.length>0){
      const ultima=novoHist[novoHist.length-1];
      D.taxaSelic=ultima.taxa;
    }
    saveData();
    toast(`Selic atualizada! ${novoHist.length} registros do Banco Central (última: ${D.taxaSelic}% a.a.)`);
    renderPage();
  }catch(e){
    toast('Erro ao buscar Selic: '+e.message,true);
    if(btn){btn.textContent='🔄 Atualizar via BCB';btn.disabled=false}
  }
}

function adicionarSelic(){
  const data=document.getElementById('novaSelicData').value;
  const taxa=+document.getElementById('novaSelicTaxa').value;
  if(!data||isNaN(taxa)||taxa<=0){toast('Preencha data e taxa',true);return}
  if(!D.historicoSelic)D.historicoSelic=[];
  // Remover se já existe nessa data
  D.historicoSelic=D.historicoSelic.filter(h=>h.data!==data);
  D.historicoSelic.push({data,taxa});
  D.historicoSelic.sort((a,b)=>a.data.localeCompare(b.data));
  // Atualizar taxa atual se for a mais recente
  const ultima=D.historicoSelic[D.historicoSelic.length-1];
  if(ultima)D.taxaSelic=ultima.taxa;
  saveData();toast(`Taxa Selic ${taxa}% adicionada em ${fmtD(data)}`);renderPage();
}

function removerSelic(idx){
  const sorted=[...(D.historicoSelic||[])].sort((a,b)=>b.data.localeCompare(a.data));
  const item=sorted[idx];
  if(!item)return;
  if(!confirm(`Remover taxa ${item.taxa}% de ${fmtD(item.data)}?`))return;
  D.historicoSelic=D.historicoSelic.filter(h=>!(h.data===item.data&&h.taxa===item.taxa));
  saveData();toast('Taxa removida');renderPage();
}

let orgUsers=[];let usersLoaded=false;
async function loadOrgUsers(){
  if(!userProfile||userProfile.role!=='admin')return;
  const{data}=await SB.from('profiles').select('*').eq('org_id',userProfile.org_id);
  orgUsers=data||[];
  usersLoaded=true;
  // Re-render a tabela se já estiver na aba
  const tbl=document.getElementById('usersTableBody');
  if(tbl)tbl.innerHTML=renderUsersRows();
  const cnt=document.getElementById('usersCount');
  if(cnt)cnt.textContent=orgUsers.length;
}
function renderUsersRows(){
  return orgUsers.map(u=>`<tr>
    <td><strong>${u.nome}</strong></td>
    <td>${u.email}</td>
    <td><span class="badge ${u.role==='admin'?'b-entrada':'b-pendente'}">${u.role}</span></td>
    <td>${u.role==='admin'?'✅ Tudo':`<select onchange="atualizarPerm('${u.id}','perm_view',this.value)"><option value="true"${u.perm_view?' selected':''}>Sim</option><option value="false"${!u.perm_view?' selected':''}>Não</option></select>`}</td>
    <td>${u.role==='admin'?'':`<select onchange="atualizarPerm('${u.id}','perm_insert',this.value)"><option value="true"${u.perm_insert?' selected':''}>Sim</option><option value="false"${!u.perm_insert?' selected':''}>Não</option></select>`}</td>
    <td>${u.role==='admin'?'':`<select onchange="atualizarPerm('${u.id}','perm_edit',this.value)"><option value="true"${u.perm_edit?' selected':''}>Sim</option><option value="false"${!u.perm_edit?' selected':''}>Não</option></select>`}</td>
    <td>${u.role==='admin'?'':`<select onchange="atualizarPerm('${u.id}','perm_delete',this.value)"><option value="true"${u.perm_delete?' selected':''}>Sim</option><option value="false"${!u.perm_delete?' selected':''}>Não</option></select>`}</td>

async function atualizarPerm(userId,field,val){
  const boolVal=val==='true';
  await SB.from('profiles').update({[field]:boolVal}).eq('id',userId);
  const u=orgUsers.find(x=>x.id===userId);
  if(u)u[field]=boolVal;
  toast(`Permissão atualizada!`);
}

async function convidarUsuario(){
  const nome=document.getElementById('invNome').value.trim();
  const email=document.getElementById('invEmail').value.trim();
  const senhaInput=document.getElementById('invSenha').value;
  if(!nome||!email){toast('Preencha nome e email',true);return}
  // Usar senha digitada ou gerar automaticamente
  let senha=senhaInput.trim();
  const senhaManual=senha.length>0;
  if(senhaManual&&senha.length<6){toast('Senha precisa ter no mínimo 6 caracteres',true);return}
  if(!senhaManual)senha='Lush'+Math.random().toString(36).slice(2,8)+'!1';
  const pView=document.getElementById('invView').value==='true';
  const pInsert=document.getElementById('invInsert').value==='true';
  const pEdit=document.getElementById('invEdit').value==='true';
  const pDelete=document.getElementById('invDelete').value==='true';
  const{data,error}=await SB.auth.signUp({
    email,password:senha,
    options:{data:{nome,org_id:userProfile.org_id,role:'member',perm_view:pView,perm_insert:pInsert,perm_edit:pEdit,perm_delete:pDelete}}
  });
  if(error){toast('Erro: '+error.message,true);return}
  alert(`Usuário criado com sucesso!\n\nEmail: ${email}\nSenha: ${senha}\n\nEnvie esses dados ao usuário para ele fazer o primeiro login.`);
  toast(`Usuário ${nome} criado!`);
  document.getElementById('invNome').value='';document.getElementById('invEmail').value='';document.getElementById('invSenha').value='';
  setTimeout(async()=>{await loadOrgUsers();renderPage()},1500);
}

async function resetarSenhaUsuario(userId,nome){
  const novaSenha=prompt(`Definir nova senha para ${nome}:\n\n(mínimo 6 caracteres)`);
  if(!novaSenha)return;
  if(novaSenha.length<6){toast('Senha precisa ter no mínimo 6 caracteres',true);return}
  const{error}=await SB.rpc('admin_reset_password',{target_user_id:userId,new_password:novaSenha});
  if(error){toast('Erro: '+error.message,true);return}
  toast(`Senha de ${nome} atualizada com sucesso!`);
}

// ═══════ EXPORT / IMPORT ═══════
function exportData(){
  const blob=new Blob([JSON.stringify(D,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='lush-griffes-backup-'+hoje()+'.json';a.click();toast('Backup exportado!');
}
function importData(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=function(ev){
    try{const data=JSON.parse(ev.target.result);if(data.produtos&&data.movimentacoes){D=data;if(!D.planoContas)D.planoContas=DEFAULT_DATA.planoContas;if(!D.contasPagar)D.contasPagar=[];if(!D.contasReceber)D.contasReceber=[];saveData();renderPage();toast('Dados importados!')}else{toast('Arquivo inválido',true)}}catch(err){toast('Erro: '+err.message,true)}
  };reader.readAsText(file);e.target.value='';
}
