<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUSH GRIFFES - Sistema Financeiro</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
<style>
:root{--bg:#f1f5f9;--card:#fff;--dark:#1e293b;--dark2:#334155;--blue:#3b82f6;--blue-d:#1e40af;--green:#22c55e;--red:#ef4444;--orange:#f59e0b;--purple:#8b5cf6;--emerald:#10b981;--pink:#ec4899;--gray:#64748b;--gray-l:#94a3b8;--border:#e2e8f0;--text:#1e293b;--text2:#475569;--cyan:#06b6d4;--teal:#14b8a6}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text)}
.header{background:linear-gradient(135deg,#1e293b,#334155);color:#fff;padding:16px 24px;display:flex;justify-content:space-between;align-items:center}
.header h1{font-size:18px}
.header-right{display:flex;gap:8px}
.header-right button{background:rgba(255,255,255,.15);color:#fff;border:none;padding:6px 14px;border-radius:8px;font-size:11px;cursor:pointer}
.header-right button:hover{background:rgba(255,255,255,.25)}
.nav{display:flex;background:#fff;border-bottom:1px solid var(--border);overflow-x:auto}
.nav-item{padding:10px 14px;font-size:11px;font-weight:600;color:var(--gray);cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap}
.nav-item:hover{color:var(--blue)}
.nav-item.active{color:var(--blue);border-bottom-color:var(--blue)}
.main{padding:16px;max-width:1200px;margin:0 auto}
.page{display:none}.page.active{display:block}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:10px;margin-bottom:14px}
.card{background:#fff;border-radius:10px;padding:14px;border-left:4px solid var(--blue);box-shadow:0 1px 3px rgba(0,0,0,.06)}
.card-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--gray);font-weight:600}
.card-val{font-size:18px;font-weight:700;margin-top:2px}
.card-sub{font-size:10px;color:var(--gray-l);margin-top:2px}
.card.green{border-left-color:var(--green)}.card.red{border-left-color:var(--red)}.card.orange{border-left-color:var(--orange)}.card.purple{border-left-color:var(--purple)}.card.emerald{border-left-color:var(--emerald)}.card.pink{border-left-color:var(--pink)}.card.indigo{border-left-color:#6366f1}.card.cyan{border-left-color:var(--cyan)}.card.teal{border-left-color:var(--teal)}
.hero{background:linear-gradient(135deg,#1e40af,#3b82f6);color:#fff;border-radius:14px;padding:20px 24px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
.hero-val{font-size:28px;font-weight:800}.hero-lbl{font-size:11px;opacity:.7;margin-bottom:2px}.hero-sub{font-size:10px;opacity:.5;margin-top:6px}
.hero-pct{font-size:32px;font-weight:800;text-align:right}.hero-pct-lbl{font-size:10px;opacity:.5}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.box{background:#fff;border-radius:10px;padding:14px;box-shadow:0 1px 3px rgba(0,0,0,.06);margin-bottom:14px}
.box h3{font-size:13px;color:var(--dark2);margin-bottom:10px}
table{width:100%;border-collapse:collapse;font-size:11px}
th{background:#f8fafc;padding:7px 10px;text-align:left;font-weight:600;color:var(--text2);border-bottom:2px solid var(--border);position:sticky;top:0}
td{padding:7px 10px;border-bottom:1px solid #f1f5f9}
tr:hover td{background:#f8fafc}
.badge{display:inline-block;padding:2px 8px;border-radius:8px;font-size:10px;font-weight:600}
.b-transito{background:#fef3c7;color:#92400e}.b-estoque{background:#d1fae5;color:#065f46}.b-reserv{background:#ede9fe;color:#5b21b6}.b-vendido{background:#dbeafe;color:#1e40af}
.b-entrada{background:#d1fae5;color:#065f46}.b-saida{background:#fee2e2;color:#991b1b}
.b-pendente{background:#fef3c7;color:#92400e}.b-pago{background:#d1fae5;color:#065f46}.b-vencido{background:#fee2e2;color:#991b1b}.b-recebido{background:#d1fae5;color:#065f46}
.filters{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.fbtn{padding:5px 12px;border-radius:16px;border:1px solid var(--border);background:#fff;font-size:11px;cursor:pointer;color:var(--text2)}
.fbtn:hover,.fbtn.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.form-section{background:#fff;border-radius:12px;padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.06);margin-bottom:16px}
.form-section h2{font-size:16px;margin-bottom:16px;color:var(--dark);display:flex;align-items:center;gap:8px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-group.full{grid-column:1/-1}
.form-group label{font-size:11px;font-weight:600;color:var(--text2)}
.form-group input,.form-group select,.form-group textarea{padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;color:var(--text)}
.form-group input:focus,.form-group select:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(59,130,246,.1)}
.btn{padding:10px 20px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s}
.btn-primary{background:var(--blue);color:#fff}.btn-primary:hover{background:#2563eb}
.btn-success{background:var(--green);color:#fff}.btn-success:hover{background:#16a34a}
.btn-danger{background:var(--red);color:#fff}.btn-danger:hover{background:#dc2626}
.btn-secondary{background:#e2e8f0;color:var(--text2)}.btn-secondary:hover{background:#cbd5e1}
.btn-sm{padding:6px 12px;font-size:11px}
.btn-xs{padding:4px 8px;font-size:10px}
.item-row{display:grid;grid-template-columns:2fr 80px 1fr 80px 80px 40px;gap:8px;align-items:end;margin-bottom:8px}
.item-row input,.item-row select{padding:6px 8px;border:1px solid var(--border);border-radius:6px;font-size:12px}
.item-row button{padding:6px;border:none;background:var(--red);color:#fff;border-radius:6px;cursor:pointer;font-size:14px}
.actions{display:flex;gap:8px;margin-top:16px;justify-content:flex-end}
.toast{position:fixed;bottom:20px;right:20px;background:#065f46;color:#fff;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:600;z-index:999;opacity:0;transition:opacity .3s;box-shadow:0 4px 12px rgba(0,0,0,.2)}
.toast.show{opacity:1}
.toast.error{background:#991b1b}
.enc-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.enc-card{background:#fff;border-radius:14px;padding:18px;border-left:4px solid var(--purple);box-shadow:0 1px 3px rgba(0,0,0,.06)}
.enc-nome{font-size:18px;font-weight:700}.enc-prod{font-size:12px;color:var(--gray);margin-top:2px}
.enc-custo{font-size:18px;font-weight:700;color:var(--dark2);margin-top:10px}
.enc-info{background:#d1fae5;border-radius:6px;padding:6px 10px;margin-top:10px;font-size:10px;color:#065f46}
.enc-info.pending{background:#fef3c7;color:#92400e}
.img-thumb{width:40px;height:40px;border-radius:6px;object-fit:cover;cursor:pointer;border:1px solid var(--border)}
.img-placeholder{width:40px;height:40px;border-radius:6px;background:#f1f5f9;border:1px dashed var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;color:var(--gray-l)}
.img-count{position:absolute;bottom:1px;right:1px;background:var(--dark);color:#fff;font-size:8px;padding:1px 4px;border-radius:4px;line-height:1.2}
.img-wrap{position:relative;display:inline-block}
.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px}
.modal-card{background:#fff;border-radius:16px;max-width:500px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.modal-close{position:absolute;top:12px;right:12px;background:rgba(0,0,0,.5);color:#fff;border:none;width:32px;height:32px;border-radius:50%;font-size:18px;cursor:pointer;z-index:1}
.modal-imgs{display:flex;gap:8px;overflow-x:auto;padding:16px;background:#f8fafc;border-radius:16px 16px 0 0;position:relative}
.modal-imgs img{width:100%;max-width:300px;height:auto;border-radius:8px;flex-shrink:0;object-fit:cover}
.modal-body{padding:20px}
.modal-body h2{font-size:18px;margin-bottom:4px}
.modal-body .prod-num{font-size:13px;color:var(--gray);margin-bottom:12px}
.modal-body .prod-price{font-size:28px;font-weight:800;color:var(--green);margin:12px 0}
.modal-body .prod-info{font-size:12px;color:var(--text2);margin-bottom:4px}
.modal-share-btn{background:var(--green);color:#fff;border:none;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;margin-top:12px;width:100%}
.modal-share-btn:hover{opacity:.9}
.img-upload-area{border:2px dashed var(--border);border-radius:8px;padding:12px;text-align:center;cursor:pointer;margin-top:8px;color:var(--gray);font-size:12px}
.img-upload-area:hover{border-color:var(--blue);color:var(--blue)}
.img-preview-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.img-preview-row .prev-img{width:50px;height:50px;border-radius:6px;object-fit:cover;border:1px solid var(--border);position:relative}
.img-preview-row .prev-wrap{position:relative;display:inline-block}
.img-preview-row .prev-del{position:absolute;top:-4px;right:-4px;background:var(--red);color:#fff;border:none;width:16px;height:16px;border-radius:50%;font-size:10px;cursor:pointer;line-height:1;display:flex;align-items:center;justify-content:center}
.editable{cursor:pointer;border-bottom:1px dashed var(--gray-l);padding-bottom:1px}
.editable:hover{background:#eff6ff;border-bottom-color:var(--blue)}
.edit-input{padding:2px 4px;border:1px solid var(--blue);border-radius:4px;font-size:11px;width:100%;background:#eff6ff}
.saldo-pos{color:var(--green);font-weight:600}
.saldo-neg{color:var(--red);font-weight:600}
.inline-form{background:#f8fafc;border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:14px;display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;align-items:end}
.inline-form input,.inline-form select{padding:6px 8px;border:1px solid var(--border);border-radius:6px;font-size:12px}
.inline-form label{font-size:10px;font-weight:600;color:var(--gray);display:block;margin-bottom:2px}
.inline-form .if-group{display:flex;flex-direction:column}
.margem-pos{background:#d1fae5;color:#065f46;padding:2px 8px;border-radius:8px;font-size:10px;font-weight:700}
.margem-neg{background:#fee2e2;color:#991b1b;padding:2px 8px;border-radius:8px;font-size:10px;font-weight:700}
td.r{text-align:right;font-variant-numeric:tabular-nums}
.filter-bar{background:#fff;border:1px solid var(--border);border-radius:10px;padding:10px 14px;margin-bottom:12px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.filter-bar input,.filter-bar select{padding:5px 8px;border:1px solid var(--border);border-radius:6px;font-size:11px;min-width:120px}
.filter-bar label{font-size:10px;font-weight:600;color:var(--gray);margin-right:2px}
.filter-bar .f-group{display:flex;align-items:center;gap:4px}
.filter-bar .f-clear{font-size:10px;color:var(--blue);cursor:pointer;text-decoration:underline;margin-left:auto}
.aporte-card{background:#fff;border-radius:12px;padding:16px;border-left:4px solid var(--emerald);box-shadow:0 1px 3px rgba(0,0,0,.06)}
.aporte-card h4{font-size:14px;margin-bottom:8px}.aporte-card .a-total{font-size:22px;font-weight:800;color:var(--dark)}
.aporte-detail{display:flex;gap:16px;margin-top:8px;flex-wrap:wrap}
.aporte-detail .a-item{font-size:11px;color:var(--text2)}
.aporte-detail .a-item strong{color:var(--dark)}
@media(max-width:768px){.row2,.enc-grid,.form-grid{grid-template-columns:1fr}.cards{grid-template-columns:repeat(2,1fr)}.hero-val{font-size:22px}.hero-pct{font-size:26px}.item-row{grid-template-columns:1fr 1fr}.inline-form{grid-template-columns:1fr 1fr}.filter-bar{flex-direction:column}.nav-item{padding:8px 10px;font-size:10px}}
.login-overlay{position:fixed;inset:0;background:linear-gradient(135deg,#1e293b,#334155);display:flex;align-items:center;justify-content:center;z-index:1000}
.login-box{background:#fff;border-radius:16px;padding:40px;width:380px;max-width:90vw;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.login-box h1{font-size:22px;text-align:center;margin-bottom:4px;color:var(--dark)}
.login-box p{text-align:center;color:var(--gray);font-size:13px;margin-bottom:24px}
.login-box .form-group{margin-bottom:14px}
.login-box .form-group label{font-size:12px;font-weight:600;color:var(--text2);display:block;margin-bottom:4px}
.login-box .form-group input{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:8px;font-size:14px}
.login-box .form-group input:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(59,130,246,.1)}
.login-box .btn-login{width:100%;padding:12px;background:var(--blue);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;margin-top:8px}
.login-box .btn-login:hover{background:#2563eb}
.login-box .login-toggle{text-align:center;margin-top:14px;font-size:12px;color:var(--gray)}
.login-box .login-toggle a{color:var(--blue);cursor:pointer;text-decoration:underline}
.login-err{background:#fee2e2;color:#991b1b;padding:8px 12px;border-radius:8px;font-size:12px;margin-bottom:12px;display:none}
.login-info{background:#d1fae5;color:#065f46;padding:8px 12px;border-radius:8px;font-size:12px;margin-bottom:12px;display:none}
.perm-denied{opacity:.4;pointer-events:none;position:relative}
.user-badge{background:rgba(255,255,255,.1);padding:4px 10px;border-radius:6px;font-size:11px;display:flex;align-items:center;gap:6px}
</style>
</head>
<body>
<!-- LOGIN SCREEN -->
<div class="login-overlay" id="loginScreen">
  <div class="login-box">
    <h1>LUSH GRIFFES</h1>
    <p>Sistema Financeiro</p>
    <div class="login-err" id="loginErr"></div>
    <div class="login-info" id="loginInfo"></div>
    <div id="loginForm">
      <div class="form-group"><label>Email</label><input type="email" id="loginEmail" placeholder="seu@email.com"></div>
      <div class="form-group"><label>Senha</label><input type="password" id="loginPass" placeholder="Sua senha" onkeydown="if(event.key==='Enter')doLogin()"></div>
      <button class="btn-login" onclick="doLogin()">Entrar</button>
      <div class="login-toggle">Primeiro acesso? <a onclick="showSignup()">Criar conta</a></div>
    </div>
    <div id="signupForm" style="display:none">
      <div class="form-group"><label>Nome</label><input id="signupNome" placeholder="Seu nome"></div>
      <div class="form-group"><label>Email</label><input type="email" id="signupEmail" placeholder="seu@email.com"></div>
      <div class="form-group"><label>Senha (mín. 6 caracteres)</label><input type="password" id="signupPass" placeholder="Criar senha" onkeydown="if(event.key==='Enter')doSignup()"></div>
      <div class="form-group"><label>Nome da Empresa</label><input id="signupOrg" placeholder="Ex: LUSH GRIFFES" value="LUSH GRIFFES"></div>
      <button class="btn-login" onclick="doSignup()">Criar conta</button>
      <div class="login-toggle"><a onclick="showLogin()">Já tenho conta</a></div>
    </div>
  </div>
</div>

<!-- APP (hidden until login) -->
<div id="appWrap" style="display:none">
<div class="header">
  <div><h1>LUSH GRIFFES — Sistema Financeiro</h1><p style="font-size:11px;color:#94a3b8" id="hdr-sub"></p></div>
  <div class="header-right">
    <span class="user-badge" id="userBadge"></span>
    <button onclick="exportData()">📥 Backup</button>
    <button onclick="document.getElementById('importFile').click()">📤 Importar</button>
    <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
    <button onclick="doLogout()" style="background:rgba(239,68,68,.3)">Sair</button>
  </div>
</div>
<div class="nav" id="nav"></div>
<div class="main" id="main"></div>
</div>
<div class="toast" id="toast"></div>
<input type="file" id="imgUpload" accept="image/*" style="display:none">

<script>
// ═══════ SUPABASE CONFIG ═══════
const SUPABASE_URL = 'https://amowrabpxphmdhvldmzk.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFtb3dyYWJweHBobWRodmxkbXprIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxOTQ0MTQsImV4cCI6MjA5Mjc3MDQxNH0.gOGPzk315DSVNGwKzl3fHd5XNlgeklZ2rj4wukllvN0';
const SB = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {auth:{persistSession:true,storageKey:'lush-griffes-auth',storage:window.localStorage}});
let currentUser = null;
let userProfile = null;
const PERMS = { view:false, insert:false, edit:false, delete:false };

function showLogin(){document.getElementById('loginForm').style.display='';document.getElementById('signupForm').style.display='none';document.getElementById('loginErr').style.display='none';document.getElementById('loginInfo').style.display='none'}
function showSignup(){document.getElementById('loginForm').style.display='none';document.getElementById('signupForm').style.display='';document.getElementById('loginErr').style.display='none'}
function loginErr(msg){const e=document.getElementById('loginErr');e.textContent=msg;e.style.display='block'}
function loginInfo(msg){const e=document.getElementById('loginInfo');e.textContent=msg;e.style.display='block'}

async function doLogin(){
  const email=document.getElementById('loginEmail').value.trim();
  const pass=document.getElementById('loginPass').value;
  if(!email||!pass){loginErr('Preencha email e senha');return}
  console.log('LOGIN tentando:', email, 'URL:', SUPABASE_URL);
  const{data,error}=await SB.auth.signInWithPassword({email,password:pass});
  if(error){console.error('LOGIN erro completo:', JSON.stringify(error));loginErr(error.message+' ['+( error.status||'')+']');return}
  console.log('LOGIN sucesso:', data.user.id);
  await initApp(data.user);
}

async function doSignup(){
  const nome=document.getElementById('signupNome').value.trim();
  const email=document.getElementById('signupEmail').value.trim();
  const pass=document.getElementById('signupPass').value;
  const orgNome=document.getElementById('signupOrg').value.trim()||'Minha Empresa';
  if(!nome||!email||!pass){loginErr('Preencha todos os campos');return}
  if(pass.length<6){loginErr('Senha precisa ter no mínimo 6 caracteres');return}
  const{data,error}=await SB.auth.signUp({email,password:pass,options:{data:{nome,org_nome:orgNome}}});
  if(error){loginErr(error.message);return}
  if(data.user&&!data.user.confirmed_at){
    loginInfo('Conta criada! Verifique seu email para confirmar, depois faça login.');
    showLogin();
  } else {
    await initApp(data.user);
  }
}

async function doLogout(){
  await SB.auth.signOut();
  currentUser=null;userProfile=null;
  document.getElementById('appWrap').style.display='none';
  document.getElementById('loginScreen').style.display='flex';
  showLogin();
}

async function initApp(user){
  currentUser=user;
  // Buscar perfil (com retry pois o trigger pode demorar)
  let prof=null;
  for(let i=0;i<5;i++){
    const{data,error}=await SB.from('profiles').select('*').eq('id',user.id).maybeSingle();
    if(data){prof=data;break}
    await new Promise(r=>setTimeout(r,800));
  }
  userProfile=prof;
  if(prof){
    PERMS.view=prof.role==='admin'||prof.perm_view;
    PERMS.insert=prof.role==='admin'||prof.perm_insert;
    PERMS.edit=prof.role==='admin'||prof.perm_edit;
    PERMS.delete=prof.role==='admin'||prof.perm_delete;
    document.getElementById('userBadge').textContent=(prof.nome||user.email)+' ('+prof.role+')';
  } else {
    // Perfil não encontrado — dar acesso total como fallback
    PERMS.view=true;PERMS.insert=true;PERMS.edit=true;PERMS.delete=true;
    document.getElementById('userBadge').textContent=user.email+' (sem perfil)';
  }
  // Carregar dados
  await loadDataFromSupabase();
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('appWrap').style.display='';
  buildNav();renderPage();
}

async function loadDataFromSupabase(){
  if(!userProfile)return;
  const{data}=await SB.from('app_data').select('data').eq('org_id',userProfile.org_id).single();
  if(data&&data.data&&Object.keys(data.data).length>0){
    const d=data.data;
    // Migrations
    if(!d.planoContas)d.planoContas=DEFAULT_DATA.planoContas;
    if(!d.contasPagar)d.contasPagar=[];
    if(!d.contasReceber)d.contasReceber=[];
    if(!d.fornecedores)d.fornecedores=DEFAULT_DATA.fornecedores;

    D=d;
  } else {
    // Primeira vez: usar dados padrão e salvar
    D=JSON.parse(JSON.stringify(DEFAULT_DATA));

      if((v.saldoReceber||0)>0){
        D.contasReceber.push({id:D.contasReceber.length+1,desc:`Venda — ${v.cliente} — ${v.produto}`,valor:v.saldoReceber,vencimento:v.data,cliente:v.cliente,vendaId:v.id,status:'Pendente',dataReceb:'',obs:''});

  }
}

// ═══════ METRICS ═══════
function calcMetrics(){
  let caixa=0,mercT=0,mercE=0,mercR=0,contasR=0;
  let itT=0,itE=0,itR=0,totalU=0;
  const catTot={};
  D.produtos.forEach(p=>{
    const c=p.custo||0,q=p.qtd||1;totalU+=q;
    if(p.status==='Em Trânsito'){mercT+=c;itT+=q}
    else if(p.status==='Em Estoque'){mercE+=c;itE+=q}
    else if(p.status==='Reservado (Encomenda)'){mercR+=c;itR+=q}
    catTot[p.cat]=(catTot[p.cat]||0)+c;
  });
  D.movimentacoes.forEach(m=>{if(m.tipo==='Entrada')caixa+=m.valor;else caixa-=m.valor});
  D.vendas.forEach(v=>contasR+=(v.saldoReceber||0));
  const despTotal=D.despesas.reduce((a,d)=>a+(d.valor||0),0);
  const lucroVendas=D.vendas.reduce((a,v)=>a+((v.valorVenda||0)-(v.custo||0)),0);
  const faturamento=D.vendas.reduce((a,v)=>a+(v.valorVenda||0),0);
  const totalMerc=mercT+mercE+mercR;
  const totalAtivos=caixa+totalMerc+contasR;
  const patrimonio=totalAtivos;
  const lucroAcum=patrimonio-D.capital;
  const pctCaixa=patrimonio>0?Math.round(caixa/patrimonio*100):0;
  return{caixa,mercT,mercE,mercR,contasR,itT,itE,itR,totalU,catTot,despTotal,lucroVendas,faturamento,totalMerc,totalAtivos,patrimonio,lucroAcum,pctCaixa};
}

function recalcSaldos(){
  // Ordenar movimentações por data (crescente), desempate por id
  D.movimentacoes.sort((a,b)=>{const d=a.data.localeCompare(b.data);return d!==0?d:a.id-b.id});
  let saldo=0;
  D.movimentacoes.forEach(m=>{if(m.tipo==='Entrada')saldo+=m.valor;else saldo-=m.valor;m.saldo=Math.round(saldo*100)/100});
}

// ═══════ APORTES POR SÓCIO ═══════
function getSelicNaData(dataStr){
  const hist=[...(D.historicoSelic||[])].sort((a,b)=>a.data.localeCompare(b.data));
  let taxa=D.taxaSelic||14.75;
  for(const h of hist){if(h.data<=dataStr)taxa=h.taxa;else break}
  return taxa;
}

function calcCorrecaoAporte(valor,dataAporte,dataRef){
  if(!dataAporte||!dataRef)return{corrigido:valor,correcao:0,dias:0,detalhes:[]};
  const d1=new Date(dataAporte);const d2=new Date(dataRef);
  const diasTotal=Math.max(0,Math.floor((d2-d1)/(1000*60*60*24)));
  if(diasTotal===0)return{corrigido:valor,correcao:0,dias:0,detalhes:[]};
  const spread=(D.spreadAportes||3)/100;
  const hist=[...(D.historicoSelic||[])].sort((a,b)=>a.data.localeCompare(b.data));
  // Montar períodos: de dataAporte até dataRef, usando a taxa vigente em cada trecho
  const periodos=[];
  let cursor=dataAporte;
  for(const h of hist){
    if(h.data<=dataAporte)continue; // taxa anterior ao aporte, já capturada
    if(h.data>=dataRef)break; // mudança após a data de referência
    if(h.data>cursor){periodos.push({de:cursor,ate:h.data,selic:getSelicNaData(cursor)});cursor=h.data}
  }
  periodos.push({de:cursor,ate:dataRef,selic:getSelicNaData(cursor)});
  // Calcular fator composto por período
  let fator=1;const detalhes=[];
  for(const p of periodos){
    const dd=Math.max(0,Math.floor((new Date(p.ate)-new Date(p.de))/(1000*60*60*24)));
    if(dd===0)continue;
    const taxaAnual=(p.selic/100)+spread;
    const fatorP=Math.pow(1+taxaAnual,dd/365);
    fator*=fatorP;
    detalhes.push({de:p.de,ate:p.ate,dias:dd,selic:p.selic,taxaTotal:(p.selic+D.spreadAportes||3),fator:fatorP});
  }
  const corrigido=Math.round(valor*fator*100)/100;
  return{corrigido,correcao:Math.round((corrigido-valor)*100)/100,dias:diasTotal,fator,detalhes};
}

function getAportesCorrigidos(){
  const h=hoje();const aportes=getAportes();
  return aportes.map(a=>{const c=calcCorrecaoAporte(a.valor,a.data,h);return{...a,...c}});
}

function getAportes(){
  const lista=[];
  D.movimentacoes.forEach(m=>{
    if(m.tipo!=='Entrada')return;
    if(m.cat!=='Capital Inicial'&&m.cat!=='Aporte Sócio')return;
    const desc=m.desc.toLowerCase();
    let tipo='💵 Dinheiro';
    if(desc.includes('mercadoria')||desc.includes('relógio')||desc.includes('relogio'))tipo='📦 Mercadoria';
    else if(desc.includes('iphone')||desc.includes('luz de anel'))tipo='🧾 Despesa paga';
    lista.push({data:m.data,desc:m.desc,valor:m.valor,tipo});
  });
  return lista;
}

function badgeS(s){const m={'Em Trânsito':'b-transito','Em Estoque':'b-estoque','Reservado (Encomenda)':'b-reserv','Vendido':'b-vendido'};return `<span class="badge ${m[s]||'b-transito'}">${s}</span>`}

// Desdobra um produto em N unidades (variante usada na pagina Estoque - chama renderPage)
function desdobrarProdutoEstoque(prodId){
  if(!PERMS.insert){toast('Sem permissão para inserir',true);return}
  const p=D.produtos.find(x=>x.id===prodId);if(!p)return;
  if(p.status&&p.status!=='Em Estoque'){
    if(!confirm(`⚠ Produto está com status "${p.status}". Desdobrar mesmo assim?\n\n(Os duplicados nascerão com status "Em Estoque")`))return;
  }
  const defQtd=p.qtd&&p.qtd>1?p.qtd:10;
  const inp=prompt(`Desdobrar "${p.nome||'(sem nome)'}" em quantas unidades separadas?\n\nCada unidade ficará com qty=1 e o mesmo custo (${fmt(p.custo)}).\nTotal: ${fmt((p.custo||0)*defQtd)} (custo × unidades).\n\nSe quiser ajustar o custo unitário antes, cancela e edita o Custo na tabela primeiro.`,String(defQtd));
  if(!inp)return;
  const n=parseInt(inp);
  if(isNaN(n)||n<2){toast('Número inválido (mínimo 2)',true);return}
  const baseName=(p.nome||'Produto').replace(/\s*#\d+$/,'');
  const tinhaNumero=/\s*#\d+$/.test(p.nome||'');
  if(!tinhaNumero)p.nome=baseName+' #1';
  p.qtd=1;
  for(let i=2;i<=n;i++){
    const copia=JSON.parse(JSON.stringify(p));
    copia.id=D.nextProdId++;
    copia.nome=baseName+' #'+i;
    copia.qtd=1;
    copia.status='Em Estoque';
    delete copia.cliente;
    D.produtos.push(copia);
  }
  saveData();renderPage();
  toast(`✓ Desdobrado em ${n} unidades: ${baseName} #1 a #${n}`);
}

function excluirProdutoEstoque(prodId){
  if(!PERMS.delete){toast('Sem permissão para excluir',true);return}
  const p=D.produtos.find(x=>x.id===prodId);if(!p)return;
  let msg=`Remover "${p.nome||'(sem nome)'}" do estoque?`;
  if(p.status&&p.status!=='Em Estoque'){
    msg=`⚠ ATENÇÃO: este produto está com status "${p.status}".\nRemovê-lo pode afetar vendas ou encomendas vinculadas.\n\nConfirma a remoção do estoque?`;
  }
  if(!confirm(msg))return;
  D.produtos=D.produtos.filter(x=>x.id!==prodId);
  saveData();renderPage();
  toast(`Produto "${p.nome}" removido do estoque`);
}

function mudaStatus(id,val){if(!val)return;const p=D.produtos.find(x=>x.id===id);if(p){p.status=val;saveData();renderPage();toast('Status atualizado: '+p.nome)}}
function mudaCat(id,val){const p=D.produtos.find(x=>x.id===id);if(p){p.cat=val;saveData();toast('Categoria atualizada: '+p.nome)}}

function uploadImg(prodId){
  const inp=document.getElementById('imgUpload');
  inp.onchange=function(e){
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=function(ev){
      const img=new Image();
      img.onload=function(){
        const canvas=document.createElement('canvas');
        const MAX=400;let w=img.width,h=img.height;
        if(w>h){if(w>MAX){h=h*(MAX/w);w=MAX}}else{if(h>MAX){w=w*(MAX/h);h=MAX}}
        canvas.width=w;canvas.height=h;canvas.getContext('2d').drawImage(img,0,0,w,h);
        const p=D.produtos.find(x=>x.id===prodId);
        if(p){
          if(!p.imgs)p.imgs=[];
          if(p.img&&!p.imgs.includes(p.img))p.imgs.unshift(p.img);
          const dataUrl=canvas.toDataURL('image/jpeg',0.7);
          if(p.imgs.length<5){p.imgs.push(dataUrl)}else{toast('Máximo de 5 fotos',true);return}
          p.img=p.imgs[0];
          saveData();renderPage();toast('Foto adicionada: '+p.nome);
        }
      };img.src=ev.target.result;
    };reader.readAsDataURL(file);inp.value='';
  };inp.click();
}

// ═══════ BALANÇO INVENTÁRIO ═══════
function renderBalanco(){
  const m=calcMetrics();

  // LADO 1 — Onde está o dinheiro
  const caixa=m.caixa;
  const estoque=m.mercE+m.mercT+m.mercR; // Em Estoque + Em Trânsito + Reservado
  // A Receber: saldo a receber das vendas menos o custo dos produtos reservados (encomendas)
  const aReceber=m.contasR-m.mercR;
  const totalLado1=Math.round((caixa+estoque+aReceber)*100)/100;

  // Contas a Pagar pendentes (dívidas com fornecedores)
  const cpPendente=D.contasPagar.filter(c=>c.status!=='Pago').reduce((a,c)=>a+(c.valor||0),0);

  // LADO 2 — De onde veio o dinheiro
  const aportesLista=getAportes();
  const aportes=aportesLista.reduce((a,x)=>a+x.valor,0);
  const despesas=m.despTotal;
  const lucro=m.lucroVendas;
  const totalLado2=Math.round((aportes-despesas+lucro-cpPendente)*100)/100;

  // Diferença
  const diferenca=Math.round((totalLado1-totalLado2)*100)/100;
  const ok=Math.abs(diferenca)<0.02;

  return `
  <div class="form-section">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px"><h2>⚖️ Balanço Inventário</h2><button class="btn btn-sm" onclick="gerarPDFBalanco()" style="background:var(--dark);color:#fff">📄 Baixar PDF</button></div>
    <p style="font-size:12px;color:var(--gray);margin-bottom:16px">Verificação patrimonial — o resultado deve ser <strong>R$ 0,00</strong> se todas as movimentações estão corretas.</p>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px">

      <div class="box" style="border-top:4px solid var(--blue)">
        <h3 style="color:var(--blue);margin-bottom:12px">📍 Onde está o dinheiro</h3>
        <table>
          <tbody>
            <tr><td style="font-weight:600;padding:8px 12px">💰 Caixa</td><td class="r" style="font-weight:600;padding:8px 12px;font-size:15px">${fmt(caixa)}</td></tr>
            <tr style="background:#f8fafc"><td style="padding:8px 12px">📦 Estoque <span style="font-size:10px;color:var(--gray)">(${m.itE} em estoque + ${m.itT} em trânsito + ${m.itR} reservados)</span></td><td class="r" style="font-weight:600;padding:8px 12px;font-size:15px">${fmt(estoque)}</td></tr>
            <tr><td style="padding:8px 12px">📋 A Receber <span style="font-size:10px;color:var(--gray)">(${fmt(m.contasR)} − ${fmt(m.mercR)} custo reservados)</span></td><td class="r" style="font-weight:600;padding:8px 12px;font-size:15px">${fmt(aReceber)}</td></tr>
          </tbody>
          <tfoot>
            <tr style="background:var(--blue);color:#fff"><td style="font-weight:700;padding:10px 12px;border-radius:0 0 0 8px">TOTAL</td><td class="r" style="font-weight:700;padding:10px 12px;font-size:16px;border-radius:0 0 8px 0">${fmt(totalLado1)}</td></tr>
          </tfoot>
        </table>
      </div>

      <div class="box" style="border-top:4px solid var(--green)">
        <h3 style="color:var(--green);margin-bottom:12px">📊 De onde veio o dinheiro</h3>
        <table>
          <tbody>
            <tr><td style="font-weight:600;padding:8px 12px">💼 Aportes <span style="font-size:10px;color:var(--gray)">(${aportesLista.length} lançamentos)</span></td><td class="r" style="font-weight:600;padding:8px 12px;font-size:15px;color:var(--green)">+ ${fmt(aportes)}</td></tr>
            <tr style="background:#f8fafc"><td style="padding:8px 12px">📉 Despesas</td><td class="r" style="font-weight:600;padding:8px 12px;font-size:15px;color:var(--red)">− ${fmt(despesas)}</td></tr>
            <tr><td style="padding:8px 12px">📈 Lucro com Vendas</td><td class="r" style="font-weight:600;padding:8px 12px;font-size:15px;color:var(--green)">+ ${fmt(lucro)}</td></tr>
            ${cpPendente>0?`<tr style="background:#f8fafc"><td style="padding:8px 12px">🔴 Contas a Pagar</td><td class="r" style="font-weight:600;padding:8px 12px;font-size:15px;color:var(--red)">− ${fmt(cpPendente)}</td></tr>`:''}
          </tbody>
          <tfoot>
            <tr style="background:var(--green);color:#fff"><td style="font-weight:700;padding:10px 12px;border-radius:0 0 0 8px">TOTAL</td><td class="r" style="font-weight:700;padding:10px 12px;font-size:16px;border-radius:0 0 8px 0">${fmt(totalLado2)}</td></tr>
          </tfoot>
        </table>
      </div>

    </div>

    <div class="box" style="text-align:center;padding:20px;border:3px solid ${ok?'var(--green)':'var(--red)'}">
      <div style="font-size:12px;color:var(--gray);text-transform:uppercase;letter-spacing:1px;font-weight:600;margin-bottom:4px">Resultado do Balanço</div>
      <div style="font-size:14px;color:var(--text2);margin-bottom:8px">${fmt(totalLado1)} − ${fmt(totalLado2)}</div>
      <div style="font-size:32px;font-weight:800;color:${ok?'var(--green)':'var(--red)'}">${fmt(diferenca)}</div>
      <div style="font-size:12px;margin-top:4px;color:${ok?'var(--green)':'var(--red)'}">
        ${ok?'✅ Balanço correto — todas as movimentações estão batendo':'⚠️ Diferença encontrada — verifique as movimentações'}
      </div>
    </div>
  </div>`;

function renderEncomendas(){
  const enc=D.produtos.filter(p=>p.status==='Reservado (Encomenda)');
  const clients={};
  enc.forEach(p=>{const c=p.cliente||'Desconhecido';if(!clients[c])clients[c]=[];clients[c].push(p)});
  const custoT=enc.reduce((a,p)=>a+(p.custo||0),0);
  let html=`<div class="cards">
    <div class="card purple"><div class="card-lbl">Encomendas</div><div class="card-val">${Object.keys(clients).length} clientes</div><div class="card-sub">${enc.length} itens</div></div>
    <div class="card orange"><div class="card-lbl">Custo Total</div><div class="card-val">${fmt(custoT)}</div></div>
  </div>
  <div style="text-align:right;margin-bottom:10px"><button class="btn btn-sm" onclick="gerarPDFEncomendas()" style="background:var(--purple);color:#fff">📄 Baixar PDF Encomendas</button></div>
  <div class="enc-grid">`;
  for(const [cli,items] of Object.entries(clients)){
    const custo=items.reduce((a,p)=>a+(p.custo||0),0);
    const venda=items.find(p=>p.vendaValor);
    let info;
    if(venda&&items.length===1){const lucro=venda.vendaValor-custo;const margem=venda.vendaValor>0?Math.round((lucro/venda.vendaValor)*100):0;info=`<div class="enc-info">Venda: ${fmt(venda.vendaValor)} | Lucro: ${fmt(lucro)} | Margem: ${margem}%</div>`}
    else if(venda){const totalV=items.reduce((a,p)=>a+(p.vendaValor||0),0);info=totalV>0?`<div class="enc-info">Venda total: ${fmt(totalV)}</div>`:`<div class="enc-info pending">Preço a definir</div>`}
    else{info=`<div class="enc-info pending">Preço de venda a definir</div>`}
    const prod=items.length>1?items.length+' '+items[0].cat:items[0].nome;
    html+=`<div class="enc-card"><div class="enc-nome">${cli}</div><div class="enc-prod">${prod}</div><div class="enc-custo">${fmt(custo)}</div>${info}</div>`;
  }
  return html+'</div>';
}

function calcMargemPreview(){

  const custo=+(opt?opt.dataset.custo:0);const venda=+(document.getElementById('vValor').value||0);

function salvarVenda(){
  const cliente=document.getElementById('vCliente').value;const data=document.getElementById('vData').value;
  const prodId=+document.getElementById('vProduto').value;const valorVenda=+document.getElementById('vValor').value;
  const forma=document.getElementById('vForma').value;const recebeu=document.getElementById('vRecebeu').value;
  if(!cliente||!valorVenda||!data){toast('Preencha todos os campos',true);return}
  const prod=D.produtos.find(p=>p.id===prodId);if(!prod){toast('Produto não encontrado',true);return}
  const custo=prod.custo||0;const nv=nextId(D.vendas);

  if(forma==='Parcelado'){
    const nParcelas=Math.max(2,Math.min(24,+(document.getElementById('vParcelas').value||3)));
    const valorParcela=Math.round((valorVenda/nParcelas)*100)/100;
    // Ajustar última parcela pra bater o total exato
    const ajuste=Math.round((valorVenda-valorParcela*nParcelas)*100)/100;

    D.vendas.push({id:nv,data,cliente,produto:prod.nome,produtoId:prod.id,custo,valorVenda,recebido:0,saldoReceber:valorVenda,status:'Pendente',forma:`${nParcelas}x ${fmt(valorParcela)}`,nParcelas});
    prod.status='Vendido';

    // Criar uma conta a receber para cada parcela
    const venc1=document.getElementById('vVenc1').value||data;
    for(let i=0;i<nParcelas;i++){
      const dt=new Date(venc1+'T12:00:00');
      dt.setMonth(dt.getMonth()+i);
      const venc=dt.toISOString().slice(0,10);
      const vlr=i===nParcelas-1?valorParcela+ajuste:valorParcela;
      D.contasReceber.push({
        id:nextId(D.contasReceber),
        desc:`Parcela ${i+1}/${nParcelas} — ${cliente} — ${prod.nome}`,
        valor:Math.round(vlr*100)/100,
        vencimento:venc,
        cliente,
        vendaId:nv,
        status:'Pendente',
        dataReceb:'',
        obs:`Parcelado ${nParcelas}x`,
        parcela:i+1,
        totalParcelas:nParcelas
      });
    }
    saveData();
    toast(`Venda parcelada: ${prod.nome} → ${cliente} | ${nParcelas}x ${fmt(valorParcela)}`);renderPage();
  } else {
    const rec=recebeu==='sim'?valorVenda:0;const saldo=recebeu==='sim'?0:valorVenda;
    D.vendas.push({id:nv,data,cliente,produto:prod.nome,produtoId:prod.id,custo,valorVenda,recebido:rec,saldoReceber:saldo,status:recebeu==='sim'?'Pago Total':'Pendente',forma});
    prod.status='Vendido';
    if(recebeu==='sim'){
      D.movimentacoes.push({id:nextId(D.movimentacoes),data,desc:`Recebimento Venda — ${cliente} — ${prod.nome}`,tipo:'Entrada',cat:'Recebimento Venda',plano:'Receita',valor:valorVenda,saldo:0});
      recalcSaldos();
    } else {
      D.contasReceber.push({id:nextId(D.contasReceber),desc:`Venda — ${cliente} — ${prod.nome}`,valor:valorVenda,vencimento:data,cliente,vendaId:nv,status:'Pendente',dataReceb:'',obs:''});
    }
    saveData();
    const lucro=valorVenda-custo;toast(`Venda: ${prod.nome} → ${cliente} | Lucro: ${fmt(lucro)}`);renderPage();
  }
}

function cancelarVenda(vendaId){
  if(!PERMS.delete){toast('Sem permissão para excluir',true);return}
  const v=D.vendas.find(x=>x.id===vendaId);if(!v)return;
  const jaRecebido=v.recebido||0;

  let msgReceb='';
  let opcoes='';
  if(jaRecebido>0){
    msgReceb=`\n\n⚠️ Já foi recebido ${fmt(jaRecebido)} desta venda.`;
    opcoes='\n\nO que fazer com o valor recebido?\n• OK = Estornar (devolver ao cliente, remove das movimentações)\n• Cancelar = Manter como crédito do cliente';
  }

  if(jaRecebido>0){
    // Primeiro pergunta se quer cancelar
    if(!confirm(`Cancelar a venda?\n\n${v.produto} → ${v.cliente}\nValor: ${fmt(v.valorVenda)}${msgReceb}\n\nIsso vai devolver o produto ao estoque e remover contas a receber.`))return;

    // Depois pergunta sobre o valor recebido
    const estornar=confirm(`O cliente já pagou ${fmt(jaRecebido)}.\n\nDeseja ESTORNAR (remover das movimentações)?\n\n• OK = Estornar (devolver valor ao cliente)\n• Cancelar = Manter como crédito do cliente`);

    // Devolver produto
    const prod=D.produtos.find(p=>p.id===v.produtoId);
    if(prod)prod.status='Em Estoque';

    if(estornar){
      // Remover movimentações de recebimento
      const crsVenda=D.contasReceber.filter(c=>c.vendaId===vendaId);
      crsVenda.forEach(c=>{
        if(c.movIdEstorno)D.movimentacoes=D.movimentacoes.filter(m=>m.id!==c.movIdEstorno);
      });
      const descPadrao=`Recebimento Venda — ${v.cliente} — ${v.produto}`;
      D.movimentacoes=D.movimentacoes.filter(m=>!(m.desc===descPadrao&&m.tipo==='Entrada'));
      // Remover por padrão de parcela também
      D.movimentacoes=D.movimentacoes.filter(m=>!(m.desc.includes(`— ${v.cliente} —`)&&m.desc.includes('Recebimento')&&m.tipo==='Entrada'));
      toast(`Venda cancelada e ${fmt(jaRecebido)} estornado`);
    } else {
      // Manter como crédito — registrar movimentação de crédito
      D.movimentacoes.push({id:nextId(D.movimentacoes),data:hoje(),desc:`Crédito cliente ${v.cliente} — cancelamento ${v.produto}`,tipo:'Saída',cat:'Crédito Cliente',plano:'Receita',valor:0,saldo:0});
      toast(`Venda cancelada. ${fmt(jaRecebido)} mantido como crédito de ${v.cliente}`);
    }

    // Remover contas a receber e venda
    D.contasReceber=D.contasReceber.filter(c=>c.vendaId!==vendaId);
    D.vendas=D.vendas.filter(x=>x.id!==vendaId);
    recalcSaldos();saveData();renderPage();

  } else {
    // Sem recebimentos — cancelamento simples
    if(!confirm(`Cancelar a venda?\n\n${v.produto} → ${v.cliente}\nValor: ${fmt(v.valorVenda)}\n\nIsso vai:\n• Devolver o produto ao estoque\n• Remover contas a receber relacionadas`))return;

    const prod=D.produtos.find(p=>p.id===v.produtoId);
    if(prod)prod.status='Em Estoque';
    D.contasReceber=D.contasReceber.filter(c=>c.vendaId!==vendaId);
    D.vendas=D.vendas.filter(x=>x.id!==vendaId);
    recalcSaldos();saveData();
    toast(`Venda cancelada: ${v.produto} → ${v.cliente}`);renderPage();
  }
}

function drawCard(doc,x,y,w,h,label,value,color){
  // Fundo do card
  doc.setFillColor(color[0],color[1],color[2]);
  doc.roundedRect(x,y,w,h,2,2,'F');
  // Barra lateral
  doc.setFillColor(Math.max(0,color[0]-40),Math.max(0,color[1]-40),Math.max(0,color[2]-40));
  doc.rect(x,y+2,1.5,h-4,'F');
  // Label
  doc.setFontSize(7);doc.setFont(undefined,'normal');doc.setTextColor(100,116,139);
  doc.text(label.toUpperCase(),x+5,y+7);
  // Valor
  doc.setFontSize(12);doc.setFont(undefined,'bold');doc.setTextColor(30,41,59);
  doc.text(value,x+5,y+15);
  doc.setTextColor(0,0,0);
}

// ═══════ SYNC ═══════
function syncMovToDesp(movId,field,val){
  const m=D.movimentacoes.find(x=>x.id===movId);if(!m||!m.despId)return;
  const d=D.despesas.find(x=>x.id===m.despId);if(!d)return;
  if(field==='desc')d.nome=val.replace(/^Despesa — /,'');
  if(field==='cat')d.cat=val==='Despesa Operacional'?d.cat:val;
  if(field==='plano')d.plano=val;
}
function syncDespToMov(despId,field,val){
  D.movimentacoes.filter(m=>m.despId===despId).forEach(m=>{
    if(field==='nome')m.desc='Despesa — '+val;
    if(field==='plano')m.plano=val;
  });
}

function renderMov(){
  const ent=D.movimentacoes.filter(m=>m.tipo==='Entrada').reduce((a,m)=>a+(m.valor||0),0);
  const sai=D.movimentacoes.filter(m=>m.tipo==='Saída').reduce((a,m)=>a+(m.valor||0),0);
  let sorted=[...D.movimentacoes].sort((a,b)=>{const d=a.data.localeCompare(b.data);return d!==0?d:a.id-b.id});
  const allCats=['Todos',...new Set(D.movimentacoes.map(m=>m.cat).filter(Boolean))];
  const allPlanos=['Todos',...new Set(D.movimentacoes.map(m=>m.plano).filter(Boolean))];
  if(movTipo!=='Todos')sorted=sorted.filter(m=>m.tipo===movTipo);
  if(movCat!=='Todos')sorted=sorted.filter(m=>m.cat===movCat);
  if(movPlano!=='Todos')sorted=sorted.filter(m=>m.plano===movPlano);
  if(movSearch)sorted=sorted.filter(m=>m.desc.toLowerCase().includes(movSearch.toLowerCase()));
  return `
  <div class="cards">
    <div class="card green"><div class="card-lbl">Entradas</div><div class="card-val">${fmt(ent)}</div></div>
    <div class="card red"><div class="card-lbl">Saídas</div><div class="card-val">${fmt(sai)}</div></div>
    <div class="card"><div class="card-lbl">Saldo Atual</div><div class="card-val">${fmt(ent-sai)}</div></div>
    <div class="card indigo"><div class="card-lbl">Movimentações</div><div class="card-val">${D.movimentacoes.length}</div></div>
  </div>
  <div class="filter-bar">
    <div class="f-group"><label>Buscar:</label><input placeholder="Descrição..." value="${movSearch}" oninput="movSearch=this.value;renderPage()"></div>
    <div class="f-group"><label>Tipo:</label><select onchange="movTipo=this.value;renderPage()"><option${movTipo==='Todos'?' selected':''}>Todos</option><option${movTipo==='Entrada'?' selected':''}>Entrada</option><option${movTipo==='Saída'?' selected':''}>Saída</option></select></div>
    <div class="f-group"><label>Categoria:</label><select onchange="movCat=this.value;renderPage()">${allCats.map(c=>`<option${c===movCat?' selected':''}>${c}</option>`).join('')}</select></div>
    <div class="f-group"><label>Plano:</label><select onchange="movPlano=this.value;renderPage()">${allPlanos.map(c=>`<option${c===movPlano?' selected':''}>${c}</option>`).join('')}</select></div>
    <span class="f-clear" onclick="movSearch='';movTipo='Todos';movCat='Todos';movPlano='Todos';renderPage()">Limpar filtros</span>
  </div>
  <div style="text-align:right;margin-bottom:10px"><button class="btn btn-sm" onclick="gerarPDFMov()" style="background:var(--dark);color:#fff">📄 Baixar PDF Movimentações</button></div>
  <div class="box"><h3>Extrato (${sorted.length} registros)</h3><div id="movTableScroll" style="max-height:600px;overflow-y:auto">
  <table><thead><tr><th>ID</th><th>Data</th><th>Descrição</th><th>Tipo</th><th>Categoria</th><th>Plano de Contas</th><th class="r">Valor</th><th class="r">Saldo</th><th>Ação</th></tr></thead><tbody>
  ${sorted.map(m=>`<tr>
    <td>${m.id}</td><td>${fmtD(m.data)}</td>
    <td><span class="editable" onclick="abrirMovDetalhes(${m.id})" title="Clique para ver/editar detalhes, itens e comprovante">${m.desc}${(()=>{const _cm=getCompraMovId(m);if(!_cm)return'';const _n=D.produtos.filter(p=>p.movId===_cm).length;return _n>0?` <span style="font-size:9px;background:#dbeafe;color:#1e40af;padding:1px 5px;border-radius:8px;margin-left:2px;font-weight:600" title="${_n} produto(s) vinculado(s)">📦 ${_n}</span>`:''})()}${m.comprovante?` <span style="font-size:9px;background:#fef3c7;color:#92400e;padding:1px 5px;border-radius:8px;margin-left:2px;font-weight:600" title="Comprovante anexado">📎</span>`:''}</span></td>
    <td><span class="badge ${m.tipo==='Entrada'?'b-entrada':'b-saida'}">${m.tipo}</span></td>
    <td><span class="editable" onclick="editMovSelect(${m.id},'cat',this,['Capital Inicial','Pagamento Fornecedor','Recebimento Venda','Sinal Encomenda','Despesa Operacional','Custo Produto (Frete/Taxa)','Aporte Sócio','Outros'])">${m.cat||''}</span></td>
    <td><span class="editable" onclick="editMovSelect(${m.id},'plano',this,D.planoContas.concat(['Mercadoria']))">${m.plano||'—'}</span></td>
    <td class="r" style="color:${m.tipo==='Entrada'?'#22c55e':'#ef4444'};font-weight:600">${m.tipo==='Entrada'?'+':'-'} ${fmt(m.valor)}</td>
    <td class="r"><span class="${(m.saldo||0)>=0?'saldo-pos':'saldo-neg'}">${fmt(m.saldo)}</span></td>
    <td><button class="btn btn-xs" style="background:#fee2e2;color:#991b1b;border:1px solid #fca5a5;font-size:9px;padding:3px 8px" onclick="excluirMov(${m.id})">🗑️</button></td>
  </tr>`).join('')}
  </tbody></table></div></div>`;
}

function excluirMov(movId){
  if(!PERMS.delete){toast('Sem permissão para excluir',true);return}
  const m=D.movimentacoes.find(x=>x.id===movId);if(!m)return;
  if(!confirm(`Excluir movimentação?\n\n"${m.desc}"\n${m.tipo}: ${fmt(m.valor)}\n\nIsso vai recalcular todos os saldos e refletir no Dashboard.`))return;
  // Se tem despesa vinculada, remover também
  if(m.despId){D.despesas=D.despesas.filter(d=>d.id!==m.despId)}
  // Se veio de conta a pagar, voltar pra Pendente
  const cp=D.contasPagar.find(c=>c.movIdEstorno===movId);
  if(cp){cp.status='Pendente';cp.dataPgto='';cp.movIdEstorno=0;if(cp.despIdEstorno&&m.despId){cp.despIdEstorno=0}}
  // Se veio de conta a receber, voltar pra Pendente + reverter venda
  const cr=D.contasReceber.find(c=>c.movIdEstorno===movId);
  if(cr){
    if(cr.vendaId){
      const v=D.vendas.find(x=>x.id===cr.vendaId);
      if(v){v.recebido=Math.max(0,(v.recebido||0)-m.valor);v.saldoReceber=Math.max(0,(v.valorVenda||0)-v.recebido);v.status=v.saldoReceber<=0&&v.recebido>0?'Pago Total':(v.recebido>0?'Pago Parcial':'Pendente')}
    }
    cr.status='Pendente';cr.dataReceb='';cr.movIdEstorno=0;
  }
  // Remover a movimentação
  D.movimentacoes=D.movimentacoes.filter(x=>x.id!==movId);
  recalcSaldos();saveData();toast(`Movimentação excluída: ${m.desc}`);renderPage();
}

function editMovText(movId,field,el){
  if(!PERMS.edit){toast('Sem permissão para alterar',true);return}
  if(_editing)return;_editing=true;
  const m=D.movimentacoes.find(x=>x.id===movId);if(!m){_editing=false;return;}
  el.innerHTML=`<input class="edit-input" value="${m[field]||''}" onkeydown="if(event.key==='Enter')this.blur()">`;
  const inp=el.querySelector('input');let done=false;
  inp.addEventListener('blur',function(){if(done)return;done=true;_editing=false;m[field]=inp.value;syncMovToDesp(movId,field,inp.value);saveData();renderPage()});
  setTimeout(()=>inp.focus(),30);
}
function editMovSelect(movId,field,el,options){
  if(!PERMS.edit){toast('Sem permissão para alterar',true);return}
  if(_editing)return;_editing=true;
  const m=D.movimentacoes.find(x=>x.id===movId);if(!m){_editing=false;return;}
  el.innerHTML=`<select class="edit-input">${options.map(c=>`<option${c===(m[field]||'')?' selected':''}>${c}</option>`).join('')}</select>`;
  const sel=el.querySelector('select');let done=false;
  function commit(){if(done)return;done=true;_editing=false;m[field]=sel.value;syncMovToDesp(movId,field,sel.value);saveData();renderPage()}
  sel.addEventListener('change',commit);sel.addEventListener('blur',()=>setTimeout(commit,250));
  setTimeout(()=>sel.focus(),30);
}

// ═══════ MODAL DETALHES MOVIMENTAÇÃO (Itens + Comprovante) ═══════
// Retorna o id da movimentacao que "carrega" produtos para esta mov:
// - Compra normal: o proprio id (mov com cat='Pagamento Fornecedor')
// - Aporte mercadoria: se m e o lado Entrada, retorna o id do Saida pareado
// - Outros: retorna null (nao carrega produtos)
function getCompraMovId(m){
  if(!m)return null;
  if(m.cat==='Pagamento Fornecedor')return m.id;
  if(m.aportePairId){
    const _p=D.movimentacoes.find(x=>x.id===m.aportePairId);
    if(_p&&_p.cat==='Pagamento Fornecedor')return _p.id;
  }
  return null;
}

function abrirMovDetalhes(movId){
  const m=D.movimentacoes.find(x=>x.id===movId);if(!m)return;
  if(!m.itens)m.itens=[];
  if(m.comprovante===undefined)m.comprovante='';
  document.querySelectorAll('.mov-detalhes-overlay').forEach(o=>o.remove());
  const overlay=document.createElement('div');
  overlay.className='modal-overlay mov-detalhes-overlay';
  overlay.id='movDetalhesOverlay';
  overlay.onclick=function(e){if(e.target===overlay)fecharMovDetalhes()};
  overlay.innerHTML=renderMovDetalhesModal(movId);
  document.body.appendChild(overlay);
}

function fecharMovDetalhes(){
  document.querySelectorAll('.mov-detalhes-overlay').forEach(o=>o.remove());
  saveData();renderPage();
}

function refreshMovModal(movId){
  const overlay=document.getElementById('movDetalhesOverlay');
  if(overlay)overlay.innerHTML=renderMovDetalhesModal(movId);
}

        </div>

                  const stFg=p.status==='Em Estoque'?'#065f46':p.status==='Vendido'?'#1e40af':p.status&&p.status.includes('Reservado')?'#5b21b6':'#92400e';

// === HANDLERS DE ITENS DE COMPRA (operam em D.produtos como fonte da verdade) ===
function addProdItemMov(movId){
  if(!PERMS.insert){toast('Sem permissão para inserir',true);return}
  const m=D.movimentacoes.find(x=>x.id===movId);if(!m)return;
  const compraMovId=getCompraMovId(m);
  if(!compraMovId){toast('Esta movimentação não suporta itens',true);return}
  // Determinar obs (fornecedor ou socio)
  let obs;
  if(m.aportePairId){
    // Aporte mercadoria: pegar nome do socio da descricao do lado Entrada
    const ent=m.cat==='Capital Inicial'?m:D.movimentacoes.find(x=>x.id===m.aportePairId);
    const sm=ent?(ent.desc||'').match(/^Aporte\s+([A-Za-zÀ-ÿ0-9 ]+?)\s+—/i):null;
    obs=sm?`Aporte ${sm[1].trim()}`:(ent?ent.desc:`Aporte`);
  } else {
    // Compra normal: extrair fornecedor da descricao
    const dm=(m.desc||'').match(/^(?:Compra|Pagamento)\s+([A-Za-zÀ-ÿ0-9 ]+?)(?:\s+—|\s+Lote|\s+\d|\s+-)/i);
    const forn=dm?dm[1].trim():'';
    obs=forn?`Fornecedor: ${forn}`:`Mov #${compraMovId}`;
  }
  const novo={id:D.nextProdId++,nome:'',marca:'',cat:'Outro',custo:0,qtd:1,status:'Em Estoque',num:'',img:'',imgs:[],precoVenda:0,obs:obs,movId:compraMovId};
  D.produtos.push(novo);
  saveData();refreshMovModal(movId);toast('Produto adicionado ao estoque');
}

function updateProdItemMov(prodId,movId,field,val){
  if(!PERMS.edit){toast('Sem permissão para alterar',true);return}
  const p=D.produtos.find(x=>x.id===prodId);if(!p)return;
  p[field]=val;
  saveData();
  // Re-render so totals update; input that triggered onchange already lost focus
  refreshMovModal(movId);
}

function removerProdItemMov(prodId,movId){
  if(!PERMS.delete){toast('Sem permissão para excluir',true);return}
  const p=D.produtos.find(x=>x.id===prodId);if(!p)return;
  let msg=`Remover "${p.nome||'(sem nome)'}" desta compra E do estoque?`;
  if(p.status&&p.status!=='Em Estoque'){
    msg=`⚠ ATENÇÃO: este produto está com status "${p.status}".\nRemovê-lo pode afetar vendas ou encomendas vinculadas.\n\nConfirma a remoção do estoque?`;
  }
  if(!confirm(msg))return;
  D.produtos=D.produtos.filter(x=>x.id!==prodId);
  saveData();refreshMovModal(movId);toast('Produto removido do estoque');
}

function desdobrarProdItemMov(prodId,movId){
  if(!PERMS.insert){toast('Sem permissão para inserir',true);return}
  const p=D.produtos.find(x=>x.id===prodId);if(!p)return;
  if(p.status&&p.status!=='Em Estoque'){
    if(!confirm(`⚠ Produto está com status "${p.status}". Desdobrar mesmo assim?\n\n(Os duplicados nascerão com status "Em Estoque")`))return;
  }
  const defQtd=p.qtd&&p.qtd>1?p.qtd:10;
  const inp=prompt(`Desdobrar "${p.nome||'(sem nome)'}" em quantas unidades separadas?\n\nCada unidade ficará com qty=1 e o mesmo custo (${fmt(p.custo)}).\nO total: ${fmt((p.custo||0)*defQtd)} (custo × unidades)`,String(defQtd));
  if(!inp)return;
  const n=parseInt(inp);
  if(isNaN(n)||n<2){toast('Número inválido (mínimo 2)',true);return}
  // Renomear original com sufixo #1 se ainda nao tiver
  const baseName=(p.nome||'Produto').replace(/\s*#\d+$/,'');
  const tinhaNumero=/\s*#\d+$/.test(p.nome||'');
  if(!tinhaNumero)p.nome=baseName+' #1';
  p.qtd=1;
  // Criar N-1 copias
  for(let i=2;i<=n;i++){
    const copia=JSON.parse(JSON.stringify(p));
    copia.id=D.nextProdId++;
    copia.nome=baseName+' #'+i;
    copia.qtd=1;
    copia.status='Em Estoque';
    delete copia.cliente;
    D.produtos.push(copia);
  }
  saveData();refreshMovModal(movId);
  toast(`✓ Desdobrado em ${n} unidades: ${baseName} #1 a #${n}`);
}

function sincronizarValorMov(movId){
  if(!PERMS.edit){toast('Sem permissão',true);return}
  const m=D.movimentacoes.find(x=>x.id===movId);if(!m)return;
  const compraMovId=getCompraMovId(m);if(!compraMovId)return;
  const prods=D.produtos.filter(p=>p.movId===compraMovId);
  const total=prods.reduce((a,p)=>a+(+p.custo||0)*(+p.qtd||1),0);
  if(!confirm(`Atualizar valor da movimentação de ${fmt(m.valor)} para ${fmt(total)}?\n\nIsso vai atualizar tanto a Entrada quanto a Saída (se houver pareamento).`))return;
  m.valor=total;
  // Se for aporte mercadoria, atualizar tambem o par
  if(m.aportePairId){const _p=D.movimentacoes.find(x=>x.id===m.aportePairId);if(_p)_p.valor=total}
  recalcSaldos();saveData();refreshMovModal(movId);toast('Valor sincronizado');
}

function uploadComprovanteMov(movId){
  if(!PERMS.edit){toast('Sem permissão para alterar',true);return}
  const inp=document.getElementById('imgUpload');
  inp.onchange=function(e){
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=function(ev){
      const img=new Image();
      img.onload=function(){
        const canvas=document.createElement('canvas');
        const MAX=900;let w=img.width,h=img.height;
        if(w>h){if(w>MAX){h=h*(MAX/w);w=MAX}}else{if(h>MAX){w=w*(MAX/h);h=MAX}}
        canvas.width=w;canvas.height=h;canvas.getContext('2d').drawImage(img,0,0,w,h);
        const m=D.movimentacoes.find(x=>x.id===movId);
        if(m){m.comprovante=canvas.toDataURL('image/jpeg',0.78);saveData();toast('Comprovante anexado!');refreshMovModal(movId)}
      };img.onerror=function(){toast('Erro ao processar imagem',true)};img.src=ev.target.result;
    };reader.readAsDataURL(file);inp.value='';
  };inp.click();
}

function removerComprovante(movId){
  if(!PERMS.edit){toast('Sem permissão para alterar',true);return}

  const m=D.movimentacoes.find(x=>x.id===movId);if(!m)return;

// ═══════ VINCULAR PRODUTOS CADASTRADOS (conciliacao retroativa) ═══════
// Mostra somente produtos sem movId. Filtra por pista (socio/fornecedor) da descricao.
// Permite ao usuario amarrar produtos antigos a uma compra ou aporte mercadoria.
let _conState={movId:0,selected:new Set(),search:'',mostrarTodos:false,incluirVinculados:false};

function _getConciliarPista(m){
  if(!m)return {pista:'',tipoLabel:''};
  if(m.aportePairId){
    // Aporte mercadoria: pegar socio da descricao do lado Entrada
    const ent=m.cat==='Capital Inicial'?m:D.movimentacoes.find(x=>x.id===m.aportePairId);
    if(ent){
      const sm=(ent.desc||'').match(/^Aporte\s+([A-Za-zÀ-ÿ0-9 ]+?)\s+—/i);
      if(sm)return {pista:sm[1].trim(),tipoLabel:'aporte (sócio)'};
    }
    return {pista:'',tipoLabel:'aporte'};
  }
  // Compra normal: pegar fornecedor
  const dm=(m.desc||'').match(/^(?:Compra|Pagamento)\s+([A-Za-zÀ-ÿ0-9 ]+?)(?:\s+—|\s+Lote|\s+\d|\s+-)/i);
  if(dm)return {pista:dm[1].trim(),tipoLabel:'compra (fornecedor)'};
  return {pista:'',tipoLabel:'compra'};
}

function _getConciliarCandidatos(){
  const m=D.movimentacoes.find(x=>x.id===_conState.movId);if(!m)return [];
  const compraMovId=getCompraMovId(m);
  const {pista}=_getConciliarPista(m);
  let cands=_conState.incluirVinculados?D.produtos.slice():D.produtos.filter(p=>!p.movId);
  if(compraMovId)cands=cands.filter(p=>p.movId!==compraMovId);
  if(!_conState.mostrarTodos&&!_conState.incluirVinculados&&pista){
    cands=cands.filter(p=>(p.obs||'').toLowerCase().includes(pista.toLowerCase()));
  }
  const s=_conState.search.toLowerCase();
  if(s)cands=cands.filter(p=>(p.nome||'').toLowerCase().includes(s)||(p.obs||'').toLowerCase().includes(s)||(p.cat||'').toLowerCase().includes(s));
  cands.sort((a,b)=>{
    const aH=a.movId?1:0, bH=b.movId?1:0;
    if(aH!==bH)return aH-bH;
    return (a.nome||'').localeCompare(b.nome||'');
  });
  return cands;
}

function abrirConciliar(movId){
  if(!PERMS.edit){toast('Sem permissão para alterar',true);return}
  _conState={movId:movId,selected:new Set(),search:'',mostrarTodos:false,incluirVinculados:false};
  document.querySelectorAll('.con-overlay').forEach(o=>o.remove());
  const overlay=document.createElement('div');
  overlay.className='modal-overlay con-overlay';
  overlay.id='conOverlay';
  overlay.style.zIndex='1050';
  overlay.onclick=function(e){if(e.target===overlay)overlay.remove()};
  document.body.appendChild(overlay);
  renderConciliar();
}

function _buildConciliarTableHTML(){
  const m=D.movimentacoes.find(x=>x.id===_conState.movId);if(!m)return '';
  const cands=_getConciliarCandidatos();
  const movMap={};D.movimentacoes.forEach(x=>{movMap[x.id]=x});
  if(cands.length===0){
    return `<div style="padding:20px;text-align:center;color:var(--gray);font-size:12px">Nenhum produto encontrado.<br>${!_conState.incluirVinculados?`<a onclick="_conState.incluirVinculados=true;_conState.mostrarTodos=true;updateConciliarTable()" style="color:var(--blue);cursor:pointer;text-decoration:underline">Incluir produtos já vinculados a outras movimentações</a>`:'Tente desmarcar filtros ou limpar busca.'}</div>`;
  }
  return `<table style="width:100%;font-size:11px">
    <thead style="position:sticky;top:0;background:#f8fafc;z-index:1"><tr><th style="width:32px;padding:6px 8px"></th><th style="padding:6px 8px">Produto</th><th style="padding:6px 8px">Cat</th><th style="padding:6px 8px;text-align:right">Custo</th><th style="padding:6px 8px">Status</th><th style="padding:6px 8px">Dono atual</th></tr></thead>
    <tbody>
      ${cands.map(p=>{
        const checked=_conState.selected.has(p.id);
        const donoMov=p.movId?movMap[p.movId]:null;
        const rowBg=p.movId?'background:#fffbeb':'';
        return `<tr style="${rowBg}">
          <td style="padding:5px 8px"><input type="checkbox" ${checked?'checked':''} onchange="conToggle(${p.id},this.checked)"></td>
          <td style="padding:5px 8px">${p.nome||'(sem nome)'}${p.obs?`<div style="font-size:9px;color:var(--gray)">${p.obs}</div>`:''}</td>
          <td style="padding:5px 8px">${p.cat||'—'}</td>
          <td style="padding:5px 8px;text-align:right;font-variant-numeric:tabular-nums">${fmt(p.custo)}</td>
          <td style="padding:5px 8px;font-size:10px">${p.status||''}</td>
          <td style="padding:5px 8px;font-size:10px">${donoMov?`<span style="color:#92400e;font-weight:600" title="${(donoMov.desc||'').replace(/"/g,'&quot;')}">⚠ Mov #${donoMov.id}</span>`:'<span style="color:#065f46;font-weight:600">— Sem dono</span>'}</td>
        </tr>`;
      }).join('')}
    </tbody>
  </table>`;
}

function conToggle(pid,checked){
  if(checked)_conState.selected.add(pid);else _conState.selected.delete(pid);
  // Atualizar apenas footer (sem re-renderizar - preserva scroll e ux)
  const cEl=document.getElementById('conSelCount');
  if(cEl)cEl.textContent=_conState.selected.size;
  const total=Array.from(_conState.selected).reduce((a,pid)=>{const p=D.produtos.find(x=>x.id===pid);return a+(p?(+p.custo||0)*(+p.qtd||1):0)},0);
  const tEl=document.getElementById('conSelTotal');
  if(tEl)tEl.textContent=fmt(total);
  // Atualizar warning de re-vinculacao
  const m=D.movimentacoes.find(x=>x.id===_conState.movId);
  const compraMovId=m?getCompraMovId(m):null;
  const haReVincular=Array.from(_conState.selected).some(pid=>{const p=D.produtos.find(x=>x.id===pid);return p&&p.movId&&p.movId!==compraMovId});
  const wEl=document.getElementById('conWarnMove');
  if(wEl)wEl.style.display=haReVincular?'block':'none';
}

function conSelecionarTodos(sel){
  const cands=_getConciliarCandidatos();
  cands.forEach(p=>{if(sel)_conState.selected.add(p.id);else _conState.selected.delete(p.id)});
  updateConciliarTable();
}

function confirmarConciliar(){
  const m=D.movimentacoes.find(x=>x.id===_conState.movId);if(!m)return;
  const compraMovId=getCompraMovId(m);
  if(!compraMovId){toast('Esta movimentação não suporta itens',true);return}
  if(_conState.selected.size===0){toast('Nenhum produto selecionado',true);return}
  const moves=[];
  _conState.selected.forEach(pid=>{
    const p=D.produtos.find(x=>x.id===pid);
    if(!p)return;
    if(p.movId&&p.movId!==compraMovId)moves.push(p);
  });
  if(moves.length>0){
    let msg=`Você está movendo ${moves.length} produto(s) de outras movimentações para esta:\n\n`;
    msg+=moves.slice(0,8).map(p=>{const dono=D.movimentacoes.find(x=>x.id===p.movId);return `• ${p.nome||'(sem nome)'} — saindo da Mov #${p.movId}${dono?' ('+(dono.desc||'').substring(0,40)+')':''}`}).join('\n');
    if(moves.length>8)msg+=`\n... e mais ${moves.length-8}`;
    msg+='\n\nConfirma?';
    if(!confirm(msg))return;
  }
  let vinculados=0;
  _conState.selected.forEach(pid=>{
    const p=D.produtos.find(x=>x.id===pid);
    if(p){p.movId=compraMovId;vinculados++}
  });
  const movId=_conState.movId;
  _conState={movId:0,selected:new Set(),search:'',mostrarTodos:false,incluirVinculados:false};
  saveData();
  const o=document.getElementById('conOverlay');if(o)o.remove();
  refreshMovModal(movId);
  toast(`${vinculados} produto(s) vinculado(s)${moves.length?` (${moves.length} movido(s))`:''}`);
}

function editDespText(despId,field,el){
  if(_editing)return;_editing=true;
  const d=D.despesas.find(x=>x.id===despId);if(!d){_editing=false;return;}
  el.innerHTML=`<input class="edit-input" value="${d[field]||''}" onkeydown="if(event.key==='Enter')this.blur()">`;
  const inp=el.querySelector('input');let done=false;
  inp.addEventListener('blur',function(){if(done)return;done=true;_editing=false;d[field]=inp.value;syncDespToMov(despId,field,inp.value);saveData();renderPage()});
  setTimeout(()=>inp.focus(),30);
}
function editDespSelect(despId,field,el,options){
  if(_editing)return;_editing=true;
  const d=D.despesas.find(x=>x.id===despId);if(!d){_editing=false;return;}
  el.innerHTML=`<select class="edit-input">${options.map(c=>`<option${c===(d[field]||'')?' selected':''}>${c}</option>`).join('')}</select>`;
  const sel=el.querySelector('select');let done=false;
  function commit(){if(done)return;done=true;_editing=false;d[field]=sel.value;syncDespToMov(despId,field,sel.value);saveData();renderPage()}
  sel.addEventListener('change',commit);sel.addEventListener('blur',()=>setTimeout(commit,250));
  setTimeout(()=>sel.focus(),30);
}

function salvarDespesa(){
  if(!PERMS.insert){toast('Sem permissão para inserir',true);return}
  const nome=document.getElementById('dNome').value;const valor=+document.getElementById('dValor').value;
  const data=document.getElementById('dData').value;const cat=document.getElementById('dCat').value;
  const plano=document.getElementById('dPlano').value;const pago=document.getElementById('dPago').value;
  const socio=document.getElementById('dSocio').value;
  if(!nome||!valor||!data){toast('Preencha descrição, valor e data',true);return}
  const nd=nextId(D.despesas);
  D.despesas.push({id:nd,data,nome,cat,valor,pago:true,plano,obs:pago==='nao'?`Aporte ${socio}`:''});
  const nm=nextId(D.movimentacoes);
  if(pago==='nao'&&socio){
    D.movimentacoes.push({id:nm,data,desc:`Aporte ${socio} — ${nome}`,tipo:'Entrada',cat:'Aporte Sócio',plano,valor,saldo:0});
    D.movimentacoes.push({id:nm+1,data,desc:`${nome} (aporte ${socio})`,tipo:'Saída',cat:'Despesa Operacional',plano,valor,saldo:0,despId:nd});
    D.capital+=valor;
  } else {
    D.movimentacoes.push({id:nm,data,desc:`Despesa — ${nome}`,tipo:'Saída',cat:'Despesa Operacional',plano,valor,saldo:0,despId:nd});
  }
  recalcSaldos();saveData();toast(`Despesa lançada: ${nome} — ${fmt(valor)}`);renderPage();
}

function mudarStatusCP(cpId,newStatus){
  if(!PERMS.edit){toast('Sem permissão para alterar',true);renderPage();return}
  const c=D.contasPagar.find(x=>x.id===cpId);if(!c)return;
  if(newStatus==='Pago'&&c.status!=='Pago'){
    c.status='Pago';c.dataPgto=hoje();
    const nd=nextId(D.despesas);
    D.despesas.push({id:nd,data:hoje(),nome:c.desc,cat:c.cat||'Outros',valor:c.valor,pago:true,plano:c.plano||''});
    const nm=nextId(D.movimentacoes);
    D.movimentacoes.push({id:nm,data:hoje(),desc:`Pgto — ${c.desc}`,tipo:'Saída',cat:'Despesa Operacional',plano:c.plano||'Outros',valor:c.valor,saldo:0,despId:nd});
    c.movIdEstorno=nm;c.despIdEstorno=nd;
    recalcSaldos();saveData();toast(`Conta paga: ${c.desc} — ${fmt(c.valor)} (registrada no extrato)`);renderPage();
  } else if(newStatus==='Pendente'&&c.status==='Pago'){
    // Estornar: buscar por ID salvo ou por descrição
    if(c.movIdEstorno){D.movimentacoes=D.movimentacoes.filter(m=>m.id!==c.movIdEstorno)}
    else{const busca=`Pgto — ${c.desc}`;D.movimentacoes=D.movimentacoes.filter(m=>!(m.desc===busca&&m.tipo==='Saída'&&Math.abs(m.valor-c.valor)<0.01))}
    if(c.despIdEstorno){D.despesas=D.despesas.filter(d=>d.id!==c.despIdEstorno)}
    else{D.despesas=D.despesas.filter(d=>!(d.nome===c.desc&&Math.abs(d.valor-c.valor)<0.01&&d.pago===true))}
    c.status='Pendente';c.dataPgto='';c.movIdEstorno=0;c.despIdEstorno=0;
    recalcSaldos();saveData();toast(`Estornado: ${c.desc} — removido do extrato e despesas`);renderPage();
  }
}

  if(!PERMS.insert){toast('Sem permissão para inserir',true);return}

  const valor=+document.getElementById('crValor').value;const venc=document.getElementById('crVenc').value;

  D.contasReceber.push({id:nextId(D.contasReceber),desc,valor,vencimento:venc||'',cliente,vendaId:0,status:'Pendente',dataReceb:'',obs:''});
  saveData();toast(`Conta a receber: ${desc} — ${fmt(valor)}`);renderPage();

function mudarStatusCR(crId,newStatus){
  if(!PERMS.edit){toast('Sem permissão para alterar',true);renderPage();return}
  const c=D.contasReceber.find(x=>x.id===crId);if(!c)return;
  if(newStatus==='Recebido'&&c.status!=='Recebido'){
    c.status='Recebido';c.dataReceb=hoje();
    const nm=nextId(D.movimentacoes);
    D.movimentacoes.push({id:nm,data:hoje(),desc:`Recebimento — ${c.cliente||''} — ${c.desc}`,tipo:'Entrada',cat:'Recebimento Venda',plano:'Receita',valor:c.valor,saldo:0});
    c.movIdEstorno=nm;
    recalcSaldos();
    if(c.vendaId){
      const v=D.vendas.find(x=>x.id===c.vendaId);
      if(v){
        v.recebido=(v.recebido||0)+c.valor;
        v.saldoReceber=Math.max(0,(v.valorVenda||0)-v.recebido);
        v.status=v.saldoReceber<=0?'Pago Total':'Pago Parcial';
      }
    }
    saveData();toast(`Recebido: ${fmt(c.valor)} — ${c.cliente||c.desc} (registrado no extrato e vendas)`);renderPage();
  } else if(newStatus==='Pendente'&&c.status==='Recebido'){
    // Estornar: buscar por ID salvo ou por descrição
    if(c.movIdEstorno){D.movimentacoes=D.movimentacoes.filter(m=>m.id!==c.movIdEstorno)}
    else{const busca=`Recebimento — ${c.cliente||''} — ${c.desc}`;D.movimentacoes=D.movimentacoes.filter(m=>!(m.desc===busca&&m.tipo==='Entrada'&&Math.abs(m.valor-c.valor)<0.01))}
    if(c.vendaId){
      const v=D.vendas.find(x=>x.id===c.vendaId);
      if(v){
        v.recebido=Math.max(0,(v.recebido||0)-c.valor);
        v.saldoReceber=Math.max(0,(v.valorVenda||0)-v.recebido);
        v.status=v.saldoReceber<=0&&v.recebido>0?'Pago Total':(v.recebido>0?'Pago Parcial':'Pendente');
      }
    }
    c.status='Pendente';c.dataReceb='';c.movIdEstorno=0;
    recalcSaldos();saveData();toast(`Estornado: ${c.cliente||c.desc} — removido do extrato e vendas atualizada`);renderPage();
  }
}

let compraItems=[{nome:'',cat:'Tênis',custo:0,qtd:1,num:'',imgs:[]}];
function renderNovaCompra(){
  return `

  </div>

function atualizarTotalCompra(){
  const el=document.getElementById('compraTotalLabel');
  if(el)el.textContent='Total: '+fmt(compraItems.reduce((a,it)=>a+(it.custo||0)*(it.qtd||1),0));
}

function uploadCompraImg(itemIdx){
  const inp=document.getElementById('imgUpload');
  inp.onchange=function(e){
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=function(ev){
      const img=new Image();
      img.onload=function(){
        const canvas=document.createElement('canvas');
        const MAX=400;let w=img.width,h=img.height;
        if(w>h){if(w>MAX){h=h*(MAX/w);w=MAX}}else{if(h>MAX){w=w*(MAX/h);h=MAX}}
        canvas.width=w;canvas.height=h;canvas.getContext('2d').drawImage(img,0,0,w,h);
        if(!compraItems[itemIdx].imgs)compraItems[itemIdx].imgs=[];
        if(compraItems[itemIdx].imgs.length<5){
          compraItems[itemIdx].imgs.push(canvas.toDataURL('image/jpeg',0.7));
          renderPage();toast('Foto adicionada!');
        }else{toast('Máximo de 5 fotos',true)}
      };img.src=ev.target.result;
    };reader.readAsDataURL(file);inp.value='';
  };inp.click();
}

function salvarCompra(){
  if(!PERMS.insert){toast('Sem permissão para inserir',true);return}
  const forn=document.getElementById('cForn').value;const data=document.getElementById('cData').value;
  const tipo=document.getElementById('cTipo').value;const cliente=document.getElementById('cCliente').value;
  if(!data){toast('Preencha a data',true);return}
  const valid=compraItems.filter(it=>it.nome&&it.custo>0);
  if(!valid.length){toast('Adicione pelo menos 1 item',true);return}
  if(forn&&!D.fornecedores.includes(forn))D.fornecedores.push(forn);
  let total=0;
  valid.forEach(it=>{
    const qtd=it.qtd||1;
    const imgs=it.imgs||[];
    for(let j=0;j<qtd;j++){
      const suffix=qtd>1?` #${j+1}`:'';
      D.produtos.push({id:D.nextProdId++,nome:it.nome+suffix,marca:'',cat:it.cat||'Outro',custo:it.custo,qtd:1,status:tipo==='Encomenda'?'Reservado (Encomenda)':'Em Estoque',num:it.num||'',img:imgs[0]||'',imgs:imgs.slice(),precoVenda:0,obs:`Fornecedor: ${forn||'—'}`,cliente:tipo==='Encomenda'?cliente:''});
    }
    total+=it.custo*qtd;
  });
  const _newMovId=nextId(D.movimentacoes);
  D.movimentacoes.push({id:_newMovId,data,desc:`Compra ${forn||'—'} — ${valid.length} tipo(s)`,tipo:'Saída',cat:'Pagamento Fornecedor',plano:'Mercadoria',valor:total,saldo:0,itens:valid.map(it=>({nome:it.nome,cat:it.cat||'',custo:+it.custo||0,qtd:+it.qtd||1,num:it.num||''})),comprovante:''});
  // Vincular produtos recem-criados a esta movimentacao
  D.produtos.filter(p=>!p.movId&&(p.obs||'').includes(`Fornecedor: ${forn||'—'}`)).slice(-valid.reduce((a,it)=>a+(it.qtd||1),0)).forEach(p=>p.movId=_newMovId);
  recalcSaldos();saveData();compraItems=[{nome:'',cat:'Tênis',custo:0,qtd:1,num:'',imgs:[]}];
  toast(`Compra registrada! ${valid.reduce((a,i)=>a+(i.qtd||1),0)} produtos — Total: ${fmt(total)}`);showTab(2);
}

function salvarAporte(){
  if(!PERMS.insert){toast('Sem permissão para inserir',true);return}
  const socio=document.getElementById('aSocio').value;const valor=+document.getElementById('aValor').value;
  const data=document.getElementById('aData').value;const tipo=document.getElementById('aTipo').value;
  const plano=document.getElementById('aPlano').value;
  const desc=document.getElementById('aDesc').value;
  if(!socio||!valor||!data){toast('Preencha todos os campos',true);return}
  D.capital+=valor;const nm=nextId(D.movimentacoes);
  if(tipo==='dinheiro'){
    D.movimentacoes.push({id:nm,data,desc:`Aporte ${socio} — ${desc||'Depósito'}`,tipo:'Entrada',cat:'Capital Inicial',plano,valor,saldo:0});
  } else if(tipo==='mercadoria'){
    D.movimentacoes.push({id:nm,data,desc:`Aporte ${socio} — ${desc} (mercadoria)`,tipo:'Entrada',cat:'Capital Inicial',plano,valor,saldo:0,aportePairId:nm+1});
    D.movimentacoes.push({id:nm+1,data,desc:`${desc} (aporte mercadoria - sem fluxo bancário)`,tipo:'Saída',cat:'Pagamento Fornecedor',plano:'Mercadoria',valor,saldo:0,aportePairId:nm});
  } else {
    const despId=nextId(D.despesas);
    D.movimentacoes.push({id:nm,data,desc:`Aporte ${socio} — ${desc}`,tipo:'Entrada',cat:'Aporte Sócio',plano,valor,saldo:0});
    D.movimentacoes.push({id:nm+1,data,desc:`${desc} (aporte despesa ${socio})`,tipo:'Saída',cat:'Despesa Operacional',plano,valor,saldo:0,despId:despId});
    D.despesas.push({id:despId,data,nome:`${desc} (aporte despesa ${socio})`,cat:'Outros',plano,valor,pago:true});
  }
  recalcSaldos();saveData();toast(`Aporte registrado! ${socio} — ${fmt(valor)}`);renderPage();
}

function adicionarSelic2(){
  const data=document.getElementById('novaSelicData2').value;
  const taxa=+document.getElementById('novaSelicTaxa2').value;
  if(!data||isNaN(taxa)||taxa<=0){toast('Preencha data e taxa',true);return}
  if(!D.historicoSelic)D.historicoSelic=[];
  D.historicoSelic=D.historicoSelic.filter(h=>h.data!==data);
  D.historicoSelic.push({data,taxa});
  D.historicoSelic.sort((a,b)=>a.data.localeCompare(b.data));
  const ultima=D.historicoSelic[D.historicoSelic.length-1];
  if(ultima)D.taxaSelic=ultima.taxa;
  saveData();toast(`Taxa Selic ${taxa}% adicionada em ${fmtD(data)}`);renderPage();
}

function salvarTaxasCorr(){
  const selic=+document.getElementById('cfgSelicCorr').value;
  const spread=+document.getElementById('cfgSpreadCorr').value;
  if(isNaN(selic)||selic<0){toast('Taxa Selic inválida',true);return}
  if(isNaN(spread)||spread<0){toast('Spread inválido',true);return}
  D.taxaSelic=selic;D.spreadAportes=spread;
  saveData();toast(`Taxas atualizadas: ${selic}% + ${spread}% = ${(selic+spread).toFixed(2)}% a.a.`);renderPage();
}

function initSelicChart(){
  const canvas=document.getElementById('cSelic');if(!canvas)return;
  const hist=[...(D.historicoSelic||[])].sort((a,b)=>a.data.localeCompare(b.data));
  if(hist.length===0)return;
  // Adicionar ponto "hoje" com a última taxa pra mostrar continuação
  const dados=[...hist];
  if(dados.length>0&&dados[dados.length-1].data<hoje()){dados.push({data:hoje(),taxa:dados[dados.length-1].taxa})}
  new Chart(canvas,{
    type:'line',
    data:{
      labels:dados.map(h=>fmtD(h.data)),
      datasets:[
        {label:'Selic (% a.a.)',data:dados.map(h=>h.taxa),borderColor:'#3b82f6',backgroundColor:'rgba(59,130,246,0.1)',fill:true,stepped:true,pointRadius:4,pointBackgroundColor:'#3b82f6',borderWidth:2},
        {label:'Selic + Spread',data:dados.map(h=>h.taxa+(D.spreadAportes||3)),borderColor:'#22c55e',backgroundColor:'rgba(34,197,94,0.05)',fill:false,stepped:true,pointRadius:3,pointBackgroundColor:'#22c55e',borderWidth:2,borderDash:[5,3]}
      ]
    },
    plugins:[ChartDataLabels],
    options:{responsive:true,plugins:{legend:{position:'bottom',labels:{font:{size:10}}},datalabels:{display:function(ctx){return ctx.datasetIndex===0},anchor:'end',align:'top',color:'#1e40af',font:{weight:'bold',size:9},formatter:v=>v+'%'}},scales:{y:{beginAtZero:false,ticks:{callback:v=>v+'%'}},x:{ticks:{font:{size:9},maxRotation:45}}}}
  });
}

      </div>
      <div style="max-height:200px;overflow-y:auto;margin-bottom:10px">

        <tbody>${[...(D.historicoSelic||[])].sort((a,b)=>b.data.localeCompare(a.data)).map((h,i)=>`<tr>
          <td>${fmtD(h.data)}</td>

          <td><button class="btn btn-xs" style="background:#fee2e2;color:#991b1b;font-size:9px;padding:2px 6px" onclick="removerSelic(${i})">✕</button></td>

      </div>
      <div style="display:flex;gap:6px;align-items:end">
        <div><label style="font-size:10px;font-weight:600;display:block;margin-bottom:2px">Data</label>
